spring.application.name=spring-data-jpa-quick-example

# In-memory H2 database - no external DB setup required for this example
spring.datasource.url=jdbc:h2:mem:quickexampledb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console for browsing the database at http://localhost:8080/h2-console
spring.h2.console.enabled=true
